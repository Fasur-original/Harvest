name: Build Desktop App

# Runs on GitHub's own Windows/macOS/Linux runners rather than trying to
# cross-compile from one machine -- a PyInstaller executable (and a native
# Tauri bundle) has to be built on the OS it's meant to run on. Manually
# triggerable any time for a test build (uploaded as artifacts, no release
# created); pushing a `v*` tag additionally publishes a draft GitHub Release
# with all three platforms' installers attached.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
            backend-ext: ".exe"
          - platform: macos-latest
            rust-target: aarch64-apple-darwin
            backend-ext: ""
          - platform: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
            backend-ext: ""
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      # Tauri v2's own documented Linux CI dependency list -- webview
      # rendering, the system tray/appindicator, and icon/bundle tooling
      # aren't present on a bare Ubuntu runner by default.
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf build-essential curl wget file libssl-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      # sentence-transformers depends on torch with no CPU/GPU distinction --
      # on Linux especially, PyPI's default torch wheel drags in several GB
      # of CUDA runtime libraries (nvidia-cublas-cu12, nvidia-cudnn-cu12,
      # etc.) that this app never uses (CPU-only everywhere, no GPU setting
      # exists anywhere in the pipeline). Installing the CPU-only build from
      # PyTorch's own index first satisfies the dependency before
      # requirements-dev.txt gets a chance to pull the much larger default.
      - name: Install backend build dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements-dev.txt

      # --collect-all for the three packages most likely to trip PyInstaller's
      # static import analysis (native libs / dynamically-loaded resources) --
      # a proactive guard, not a guarantee; this hasn't been run for real yet,
      # see app-phases/10-desktop-packaging.md for the honest caveat on this.
      - name: Build backend executable (PyInstaller)
        working-directory: backend
        run: >
          pyinstaller --onefile --name backend
          --collect-all faster_whisper
          --collect-all sentence_transformers
          --collect-all sqlite_vec
          app/main.py

      - name: Place backend sidecar for Tauri
        shell: bash
        run: |
          mkdir -p desktop/src-tauri/binaries
          cp "backend/dist/backend${{ matrix.backend-ext }}" \
             "desktop/src-tauri/binaries/backend-${{ matrix.rust-target }}${{ matrix.backend-ext }}"

      - name: Install frontend dependencies
        working-directory: desktop
        run: pnpm install

      # Manual-trigger test build: just produce installers as downloadable
      # workflow artifacts, no release side effects.
      - name: Build Tauri app
        if: github.ref_type != 'tag'
        working-directory: desktop
        run: pnpm tauri build

      - name: Upload build artifacts
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: harvest-${{ matrix.platform }}
          path: desktop/src-tauri/target/release/bundle/**/*
          if-no-files-found: error

      # Tag push: build and publish a draft GitHub Release with every
      # platform's installer attached. Draft, not published outright, so a
      # broken first CI run can be deleted/fixed before anyone downloads it.
      - name: Build and publish release
        if: github.ref_type == 'tag'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Harvest ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
